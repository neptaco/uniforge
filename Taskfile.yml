version: '3'

vars:
  BINARY_NAME: uniforge
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  LDFLAGS: -X main.version={{.VERSION}}

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  deps:
    desc: Download Go dependencies
    cmds:
      - go mod download
      - go mod tidy

  build:
    desc: Build the Go CLI for the current platform
    cmds:
      - mkdir -p dist
      - go build -ldflags "{{.LDFLAGS}}" -o dist/{{.BINARY_NAME}} main.go

  build-all:
    desc: Build the Go CLI for supported release targets
    deps: [clean]
    cmds:
      - task: build-darwin-amd64
      - task: build-darwin-arm64
      - task: build-linux-amd64
      - task: build-linux-arm64
      - task: build-windows-amd64

  build-darwin-amd64:
    cmds:
      - mkdir -p dist
      - GOOS=darwin GOARCH=amd64 go build -ldflags "{{.LDFLAGS}}" -o dist/{{.BINARY_NAME}}-darwin-amd64 main.go

  build-darwin-arm64:
    cmds:
      - mkdir -p dist
      - GOOS=darwin GOARCH=arm64 go build -ldflags "{{.LDFLAGS}}" -o dist/{{.BINARY_NAME}}-darwin-arm64 main.go

  build-linux-amd64:
    cmds:
      - mkdir -p dist
      - GOOS=linux GOARCH=amd64 go build -ldflags "{{.LDFLAGS}}" -o dist/{{.BINARY_NAME}}-linux-amd64 main.go

  build-linux-arm64:
    cmds:
      - mkdir -p dist
      - GOOS=linux GOARCH=arm64 go build -ldflags "{{.LDFLAGS}}" -o dist/{{.BINARY_NAME}}-linux-arm64 main.go

  build-windows-amd64:
    cmds:
      - mkdir -p dist
      - GOOS=windows GOARCH=amd64 go build -ldflags "{{.LDFLAGS}}" -o dist/{{.BINARY_NAME}}-windows-amd64.exe main.go

  test:
    desc: Run Go tests
    cmds:
      - go test -v -race -short -coverprofile=coverage.out ./...

  test-coverage:
    desc: Open an HTML coverage report after running tests
    cmds:
      - task: test
      - go tool cover -html=coverage.out -o coverage.html

  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  check:
    desc: Run the standard Go validation flow
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: test

  clean:
    desc: Remove Go build artifacts
    cmds:
      - rm -rf dist/
      - rm -f coverage.out coverage.html

  install:
    desc: Install the Go CLI into GOBIN/GOPATH
    cmds:
      - go install -ldflags "{{.LDFLAGS}}"

  release:
    desc: Create a tagged release with GoReleaser
    cmds:
      - goreleaser release --clean

  release-snapshot:
    desc: Create a local snapshot release with GoReleaser
    cmds:
      - goreleaser release --snapshot --clean
